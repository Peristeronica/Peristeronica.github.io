name: Update Site Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  update-site-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install image conversion tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Convert Nico RSS to site data
        run: node scripts/update-nico-rss.js

      - name: Update Pixiv illust data
        run: node scripts/update-pixiv-illust.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/nico-mylist.json data/nico-mylist.js data/pixiv-illust.js assets/images/pixiv/pixiv-illust-*.webp

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update site data"
            git push
          fi
